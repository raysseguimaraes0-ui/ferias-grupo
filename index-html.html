<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Férias · Grupo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Inter+Tight:wght@600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F2F2F0;--surface:#fff;--surface2:#F7F7F5;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.13);
  --text:#18181B;--text2:#52525B;--text3:#A1A1AA;
  --radius:10px;--radius-lg:14px;--radius-xl:20px;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.04);
  --shadow-md:0 2px 12px rgba(0,0,0,0.1),0 8px 32px rgba(0,0,0,0.06);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
#loginScreen{
  display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:linear-gradient(135deg,#0f2942 0%,#1a3a5c 40%,#1e4976 100%);
  position:relative;overflow:hidden;
}
#loginScreen::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 30% 20%,rgba(255,255,255,0.05) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 80%,rgba(255,255,255,0.03) 0%,transparent 50%);
}
.login-card{
  background:rgba(255,255,255,0.97);border-radius:24px;
  padding:44px 40px 36px;width:380px;max-width:94vw;
  box-shadow:0 24px 80px rgba(0,0,0,0.3);position:relative;z-index:1;
  animation:fadeUp 0.5s ease;
}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo-icon{
  width:56px;height:56px;border-radius:14px;
  background:linear-gradient(135deg,#0f2942,#1e4976);
  display:flex;align-items:center;justify-content:center;margin:0 auto 12px;
}
.login-logo-icon svg{width:28px;height:28px;fill:none;stroke:white;stroke-width:1.8}
.login-logo h1{font-size:20px;font-weight:700;color:#18181B;letter-spacing:-0.5px}
.login-logo p{font-size:12px;color:#71717A;margin-top:2px}
.login-field{margin-bottom:14px}
.login-field label{font-size:11px;font-weight:600;color:#52525B;text-transform:uppercase;letter-spacing:0.07em;display:block;margin-bottom:5px}
.login-field input,.login-field select{
  width:100%;padding:10px 13px;border-radius:var(--radius);
  border:1.5px solid #E4E4E7;font-family:inherit;font-size:13px;
  color:#18181B;background:#fff;outline:none;transition:border-color 0.2s;
}
.login-field input:focus,.login-field select:focus{border-color:#1e4976}
.login-btn{
  width:100%;padding:11px;border-radius:var(--radius);
  background:linear-gradient(135deg,#0f2942,#1e4976);
  color:white;font-family:inherit;font-size:14px;font-weight:600;
  border:none;cursor:pointer;margin-top:6px;transition:opacity 0.2s;
  letter-spacing:0.02em;
}
.login-btn:hover{opacity:0.9}
.login-err{font-size:12px;color:#dc2626;text-align:center;margin-top:10px;display:none}
.login-users{margin-top:20px;padding-top:16px;border-top:1px solid #F4F4F5;font-size:11px;color:#A1A1AA;text-align:center;}
.login-users strong{color:#71717A}
.layout{display:flex;min-height:100vh}
#app{display:none;min-height:100vh}
.sidebar{
  width:240px;background:#0f2942;flex-shrink:0;
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
.sidebar-header{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,0.07)}
.sidebar-brand{display:flex;align-items:center;gap:10px}
.brand-icon{width:34px;height:34px;border-radius:9px;
